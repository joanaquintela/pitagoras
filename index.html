<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oitava: duas cordas</title>
<style>
  :root {
    --paper: #fbffd7;
    --long: #2f6f8f;
    --short: #b8552e;
    --ink: #1a2028;
    --muted: #6b6459;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    -webkit-font-smoothing: antialiased;
    height: 100%;
    overflow: hidden;
  }

  .wrap {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    padding: 20px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 24px;
    width: 100%;
    max-width: 900px;
  }

  .label {
    width: 130px;
    text-align: right;
    font-size: 16px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .label strong {
    display: block;
    color: var(--ink);
    font-size: 17px;
  }

  canvas {
    display: block;
    cursor: pointer;
  }

  .long-canvas { width: 100%; max-width: 620px; height: 60px; }
  .short-canvas { width: 100%; max-width: 310px; height: 60px; }

  .hint {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-top: -20px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="label"><strong>Corda longa</strong></div>
    <canvas id="stringLong" class="long-canvas" width="1240" height="120"></canvas>
  </div>
  <div class="row">
    <div class="label"><strong>Corda curta</strong>metade do comprimento — a oitava</div>
    <canvas id="stringShort" class="short-canvas" width="620" height="120"></canvas>
  </div>
</div>

<script>
(() => {
  const BASE_FREQ = 220; // corda longa
  let actx = null;

  function pluck(freq, canvas) {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();

    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, actx.currentTime);
    gain.gain.setValueAtTime(0.0001, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.35, actx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 1.6);
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.start();
    osc.stop(actx.currentTime + 1.7);

    animateString(canvas);
  }

  function animateString(canvas) {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const color = canvas.dataset.color;
    const start = performance.now();
    const duration = 1700;

    function frame(now) {
      const elapsed = now - start;
      const t = elapsed / 1000;
      const decay = Math.max(0, 1 - elapsed / duration);
      const amp = H * 0.28 * decay;

      ctx.clearRect(0, 0, W, H);
      ctx.strokeStyle = color;
      ctx.lineWidth = 5;
      ctx.lineJoin = 'round';
      ctx.beginPath();

      const samples = 200;
      for (let i = 0; i <= samples; i++) {
        const x = i / samples;
        const y = H/2 - amp * Math.sin(Math.PI * x) * Math.sin(t * 26);
        const px = x * W, py = y;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();

      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath(); ctx.arc(0, H/2, 5, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(W, H/2, 5, 0, 7); ctx.fill();

      if (elapsed < duration) {
        requestAnimationFrame(frame);
      } else {
        drawIdle(canvas);
      }
    }
    requestAnimationFrame(frame);
  }

  function drawIdle(canvas) {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const color = canvas.dataset.color;
    ctx.clearRect(0, 0, W, H);
    ctx.strokeStyle = color;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, H/2);
    ctx.lineTo(W, H/2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.arc(0, H/2, 5, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(W, H/2, 5, 0, 7); ctx.fill();
  }

  const longCanvas = document.getElementById('stringLong');
  const shortCanvas = document.getElementById('stringShort');
  longCanvas.dataset.color = getComputedStyle(document.documentElement).getPropertyValue('--long').trim();
  shortCanvas.dataset.color = getComputedStyle(document.documentElement).getPropertyValue('--short').trim();

  drawIdle(longCanvas);
  drawIdle(shortCanvas);

  longCanvas.addEventListener('click', () => pluck(BASE_FREQ, longCanvas));
  shortCanvas.addEventListener('click', () => pluck(BASE_FREQ * 2, shortCanvas));
})();
</script>
</body>
</html>
