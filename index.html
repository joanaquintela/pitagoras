<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vírgula pitagórica</title>
<style>
  :root {
    --paper: #fbffd7;
    --ink: #1a2028;
    --btn: #b8552e;
    --btn-hover: #a24a27;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    -webkit-font-smoothing: antialiased;
    height: 100%;
    overflow: hidden;
  }

  .wrap {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  button.play {
    font-family: "Iowan Old Style", Georgia, serif;
    font-size: 18px;
    padding: 16px 34px;
    background: var(--btn);
    color: #fff;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  button.play:hover { background: var(--btn-hover); }
  button.play:active { transform: scale(0.97); }
  button.play:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }
  button.play.playing { background: #6b6459; }
</style>
</head>
<body>
<div class="wrap">
  <button class="play" id="play">Ouvir a vírgula pitagórica</button>
</div>

<script>
(() => {
  const F0 = 220;
  const F1 = F0 * Math.pow(3/2, 12) / Math.pow(2, 7); // ≈223 Hz — a mesma nota, "corrigida" pelas 12 quintas
  const DURATION = 4.5; // segundos

  let actx = null;
  let playing = false;

  const btn = document.getElementById('play');

  btn.addEventListener('click', () => {
    if (playing) return;
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();

    playing = true;
    btn.classList.add('playing');
    btn.textContent = 'A tocar…';

    const now = actx.currentTime;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.22, now + 0.08);
    gain.gain.setValueAtTime(0.22, now + DURATION - 0.4);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + DURATION);
    gain.connect(actx.destination);

    const osc1 = actx.createOscillator();
    const osc2 = actx.createOscillator();
    osc1.type = 'sine';
    osc2.type = 'sine';
    osc1.frequency.setValueAtTime(F0, now);
    osc2.frequency.setValueAtTime(F1, now);
    osc1.connect(gain);
    osc2.connect(gain);
    osc1.start(now);
    osc2.start(now);
    osc1.stop(now + DURATION);
    osc2.stop(now + DURATION);

    setTimeout(() => {
      playing = false;
      btn.classList.remove('playing');
      btn.textContent = 'Ouvir a vírgula pitagórica';
    }, DURATION * 1000);
  });
})();
</script>
</body>
</html>
